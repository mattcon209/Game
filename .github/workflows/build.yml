name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Create local.properties
        working-directory: PolyLoveMarble
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate missing source files via compile script
        run: |
          # This script generates/patches all missing source files (EmberParticle, ChainsOfDesireLogo,
          # ActiveConstraint, missing imports, etc). It fails at the end because it tries to run
          # Gradle with a Termux-specific path - that's fine, all file generation happens before that.
          python3 compile_master_apk_final_v2.py || true
          echo "✓ Source generation complete"

      - name: Apply board camera visual fixes
        run: |
          python3 << 'PATCH'
          import os

          # Fix PillarsOfSummoning.kt - pillar scale 3x -> proper
          pillars_path = "PolyLoveMarble/app/src/main/java/com/polylove/marble/ui/components/PillarsOfSummoning.kt"
          if os.path.exists(pillars_path):
              with open(pillars_path, 'r') as f:
                  c = f.read()
              c = c.replace('val targetW = w * 3f', 'val targetW = w * 0.95f')
              c = c.replace('val targetH = h * 3f', 'val targetH = h * 1.7f')
              c = c.replace('tiltX * density * 0.4f', 'tiltX * density * 0.15f')
              c = c.replace('tiltY * density * 0.4f', 'tiltY * density * 0.15f')
              c = c.replace('targetW * 0.12f * scale', 'targetW * 0.28f * scale')
              c = c.replace('targetH * 0.12f * scale', 'targetH * 0.16f * scale')
              c = c.replace('targetH * 0.28f', 'targetH * 0.25f')
              c = c.replace('targetW * 0.08f * scale', 'targetW * 0.18f * scale')
              c = c.replace('targetW * 0.14f * pulseScale', 'targetW * 0.22f * pulseScale')
              with open(pillars_path, 'w') as f:
                  f.write(c)
              print("  ✓ Patched PillarsOfSummoning.kt (scale fix)")

          # Fix BoardScreen.kt - camera zoom + pawn offset + clip
          board_path = "PolyLoveMarble/app/src/main/java/com/polylove/marble/ui/screens/BoardScreen.kt"
          if os.path.exists(board_path):
              with open(board_path, 'r') as f:
                  c = f.read()
              c = c.replace('1.0f else 1.9f', '1.0f else 1.25f')
              c = c.replace('cellSize * -1.18f', 'cellSize * -0.75f')
              c = c.replace('cellSizePx * 1.18f', 'cellSizePx * 0.75f')
              old = '.border(1.5.dp, SeductiveViolet.copy(alpha = 0.3f), RoundedCornerShape(12.dp))'
              new = old + '\n                            .clip(RoundedCornerShape(12.dp))'
              if old in c and '.clip(RoundedCornerShape(12.dp))' not in c:
                  c = c.replace(old, new, 1)
              with open(board_path, 'w') as f:
                  f.write(c)
              print("  ✓ Patched BoardScreen.kt (zoom + offset fix)")

          # Fix CommonUI.kt - add missing Canvas import (composable version)
          cui_path = "PolyLoveMarble/app/src/main/java/com/polylove/marble/ui/components/CommonUI.kt"
          if os.path.exists(cui_path):
              with open(cui_path, 'r') as f:
                  c = f.read()
              if 'import androidx.compose.foundation.Canvas' not in c:
                  c = c.replace(
                      'import androidx.compose.foundation.background',
                      'import androidx.compose.foundation.Canvas\nimport androidx.compose.foundation.background'
                  )
                  with open(cui_path, 'w') as f:
                      f.write(c)
                  print("  ✓ Patched CommonUI.kt (added Canvas import)")
          PATCH

      - name: Build Debug APK
        working-directory: PolyLoveMarble
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PolyKinkMarble-debug-${{ github.run_number }}
          path: PolyLoveMarble/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Commit APK to repo
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cp PolyLoveMarble/app/build/outputs/apk/debug/app-debug.apk PolyKinkMarble.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f PolyKinkMarble.apk
          git diff --staged --quiet || {
            git commit -m "🤖 Auto-build APK from ${{ github.sha }}"
            git push
          }
