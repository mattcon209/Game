name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Create local.properties
        working-directory: PolyLoveMarble
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create stub gradle at Termux path
        run: |
          sudo mkdir -p /home/user/gradle-bin/gradle-8.5/bin && sudo chmod 755 /home/user
          echo '#!/bin/bash' | sudo tee /home/user/gradle-bin/gradle-8.5/bin/gradle > /dev/null
          echo 'echo Stub gradle' | sudo tee -a /home/user/gradle-bin/gradle-8.5/bin/gradle > /dev/null
          echo 'exit 0' | sudo tee -a /home/user/gradle-bin/gradle-8.5/bin/gradle > /dev/null
          sudo chmod +x /home/user/gradle-bin/gradle-8.5/bin/gradle

      - name: Generate missing source files via compile script
        run: python3 compile_master_apk_final_v2.py

      - name: Apply visual and import patches
        run: python3 ci_patch.py

      - name: Build Debug APK
        working-directory: PolyLoveMarble
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PolyKinkMarble-debug-${{ github.run_number }}
          path: PolyLoveMarble/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Commit APK to repo
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cp PolyLoveMarble/app/build/outputs/apk/debug/app-debug.apk PolyKinkMarble.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f PolyKinkMarble.apk
          git diff --staged --quiet || {
            git commit -m "Auto-build APK from ${{ github.sha }}"
            git push
          }
