        <polygon points="100,42 96,38 104,38" fill="currentColor"/>
        <text x="100" y="26" font-family="Cinzel, serif" font-size="13" fill="currentColor" text-anchor="middle" letter-spacing="1">BUTTON TEXT</text>
    </g>

    <g transform="translate(740, 140)" class="ui-element" id="btn-4">
        <rect x="2" y="2" width="196" height="40" fill="none" stroke="currentColor" stroke-width="2"/>
        <rect x="6" y="6" width="188" height="32" fill="none" stroke="currentColor" stroke-width="1"/>
        <path d="M 2 10 L 10 2 M 198 10 L 190 2 M 2 34 L 10 42 M 198 34 L 190 42" stroke="currentColor" stroke-width="2"/>
        <text x="100" y="26" font-family="Cinzel, serif" font-size="13" fill="currentColor" text-anchor="middle" letter-spacing="1">BUTTON TEXT</text>
    </g>

