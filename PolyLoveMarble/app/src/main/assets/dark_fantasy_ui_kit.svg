<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" width="1600" height="1200" style="background-color: #0b0a10; color: #ffffff;">
    <defs>
        <style>
            .title { font-family: 'Cinzel', 'Georgia', serif; font-size: 28px; fill: #d4af37; font-weight: bold; letter-spacing: 2px; }
            .subtitle { font-family: 'Cinzel', 'Georgia', serif; font-size: 16px; fill: #8a8aa3; letter-spacing: 1px; }
            .section-head { font-family: 'Cinzel', 'Georgia', serif; font-size: 20px; fill: #ff2a4b; letter-spacing: 2px; font-weight: bold; }
            .label { font-family: sans-serif; font-size: 11px; fill: #666; text-anchor: middle; }
            .ui-element { color: #ffffff; transition: all 0.3s ease; }
            .ui-element:hover { color: #ff2a4b; filter: drop-shadow(0 0 8px rgba(255,42,75,0.8)); }
        </style>

        <!-- GLOW FILTERS -->
        <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Background Grid Effect -->
    <rect width="1600" height="1200" fill="#09080e"/>
    <circle cx="800" cy="600" r="700" fill="#1d0d24" opacity="0.4"/>

    <!-- HEADER -->
    <text x="800" y="50" class="title" text-anchor="middle">DARK FANTASY UI KIT</text>
    <text x="800" y="75" class="subtitle" text-anchor="middle">125 High Quality Vector Game Elements</text>
    <line x1="200" y1="90" x2="1400" y2="90" stroke="#332244" stroke-width="2"/>

    <!-- 1. BUTTONS SECTION -->
    <text x="50" y="125" class="section-head">BUTTONS &amp; TABS</text>
    
    <!-- Row 1 Buttons -->
    <g transform="translate(50, 140)" class="ui-element" id="btn-1">
        <path d="M 15 2 L 185 2 L 198 15 L 198 29 L 185 42 L 15 42 L 2 29 L 2 15 Z" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M 18 6 L 182 6 L 194 18 L 194 26 L 182 38 L 18 38 L 6 26 L 6 18 Z" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="4,2"/>
        <path d="M 0 22 L 8 16 L 8 28 Z M 200 22 L 192 16 L 192 28 Z" fill="currentColor"/>
        <text x="100" y="26" font-family="Cinzel, serif" font-size="13" fill="currentColor" text-anchor="middle" letter-spacing="1">BUTTON TEXT</text>
    </g>

    <g transform="translate(280, 140)" class="ui-element" id="btn-2">
        <path d="M 22 2 L 178 2 C 190 2 198 10 198 22 C 198 34 190 42 178 42 L 22 42 C 10 42 2 34 2 22 C 2 10 10 2 22 2 Z" fill="none" stroke="currentColor" stroke-width="2"/>
        <circle cx="10" cy="22" r="3" fill="currentColor"/>
        <circle cx="190" cy="22" r="3" fill="currentColor"/>
        <text x="100" y="26" font-family="Cinzel, serif" font-size="13" fill="currentColor" text-anchor="middle" letter-spacing="1">BUTTON TEXT</text>
    </g>

    <g transform="translate(510, 140)" class="ui-element" id="btn-3">
        <path d="M 20 2 C 5 2 2 15 2 22 C 2 29 5 42 20 42 L 180 42 C 195 42 198 29 198 22 C 198 15 195 2 180 2 Z" fill="none" stroke="currentColor" stroke-width="2"/>
