        <polygon points="350,2 335,15 350,28 365,15" fill="currentColor"/>
        <polygon points="350,15 320,8 320,22" fill="currentColor"/>
        <polygon points="350,15 380,8 380,22" fill="currentColor"/>
    </g>

    <g transform="translate(800, 540)" class="ui-element" id="div-2">
        <path d="M 0 15 L 320 15 M 380 15 L 700 15" stroke="currentColor" stroke-width="2"/>
        <circle cx="350" cy="15" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
        <circle cx="350" cy="15" r="4" fill="currentColor"/>
    </g>

