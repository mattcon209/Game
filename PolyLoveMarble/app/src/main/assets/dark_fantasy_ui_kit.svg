        <path d="M 25 5 C 25 5 38 16 38 29 C 38 38 32 44 25 44 C 18 44 12 38 12 29 C 12 19 20 13 20 13 C 20 13 18 19 21 22 C 25 19 25 5 25 5 Z" fill="currentColor"/>
    </g>

    <g transform="translate(680, 430)" class="ui-element" id="icon-heart">
        <rect x="0" y="0" width="50" height="50" fill="none" stroke="#221e33" stroke-width="1"/>
        <path d="M 25 43 C 25 43 6 30 6 18 C 6 10 12 6 18 6 C 22 6 25 9 25 9 C 25 9 28 6 32 6 C 38 6 44 10 44 18 C 44 30 25 43 25 43 Z" fill="currentColor"/>
