        <circle cx="60" cy="60" r="56" fill="none" stroke="currentColor" stroke-width="2"/>
        <circle cx="60" cy="60" r="46" fill="none" stroke="currentColor" stroke-width="1"/>
        <polygon points="60,8 102,88 18,88" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <polygon points="60,112 102,32 18,32" fill="none" stroke="currentColor" stroke-width="1.5"/>
