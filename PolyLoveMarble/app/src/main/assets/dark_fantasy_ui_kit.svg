        <rect x="20" y="7" width="180" height="16" fill="#ffd700" rx="2"/>
        <text x="220" y="20" font-family="Cinzel, serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">XP: 18 / 100</text>
