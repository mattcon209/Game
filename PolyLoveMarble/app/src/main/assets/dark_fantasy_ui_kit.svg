    </g>

    <g transform="translate(200, 250)" class="ui-element" id="sigil-2">
        <circle cx="60" cy="60" r="56" fill="none" stroke="currentColor" stroke-width="2"/>
        <rect x="25" y="25" width="70" height="70" fill="none" stroke="currentColor" stroke-width="1.5" transform="rotate(45 60 60)"/>
        <line x1="10" y1="10" x2="110" y2="110" stroke="currentColor" stroke-width="1"/>
        <line x1="110" y1="10" x2="10" y2="110" stroke="currentColor" stroke-width="1"/>
        <circle cx="60" cy="60" r="24" fill="none" stroke="currentColor" stroke-width="2"/>
    </g>

    <g transform="translate(350, 250)" class="ui-element" id="sigil-3">
