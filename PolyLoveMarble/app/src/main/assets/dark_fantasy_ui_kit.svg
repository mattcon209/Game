        <circle cx="60" cy="95" r="12" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="25" cy="60" r="12" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="95" cy="60" r="12" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <polygon points="60,35 85,60 60,85 35,60" fill="none" stroke="currentColor" stroke-width="1.5"/>
    </g>

    <g transform="translate(500, 250)" class="ui-element" id="sigil-4">
        <circle cx="60" cy="60" r="56" fill="none" stroke="currentColor" stroke-width="2"/>
        <polygon points="60,10 105,95 15,95" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="60" cy="60" r="28" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="4,2"/>
