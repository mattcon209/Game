        <rect x="20" y="7" width="340" height="16" fill="#ff2a4b" rx="2"/>
        <text x="250" y="20" font-family="Cinzel, serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">HP: 850 / 1000</text>
    </g>

    <g transform="translate(580, 630)" class="ui-element" id="bar-2">
