        <rect x="18" y="18" width="344" height="224" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="4,2"/>
        <path d="M 10 30 L 30 10 M 370 30 L 350 10 M 10 230 L 30 250 M 370 230 L 350 250" stroke="currentColor" stroke-width="2"/>
        <text x="190" y="45" font-family="Cinzel, serif" font-size="16" fill="#d4af37" text-anchor="middle" font-weight="bold">FRAME WINDOW</text>
