# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx550m -XX:MaxMetaspaceSize=256m -XX:+UseSerialGC -Dfile.encoding=UTF-8
org.gradle.workers.max=1
org.gradle.parallel=false
org.gradle.daemon=false
kotlin.compiler.execution.strategy=in-process

android.useAndroidX=true
android.enableJetifier=true

# Prevent spawning external JVM processes for dexing/compilation
android.enableDexingArtifactTransform.in-process=true
android.enableR8.in-process=true
