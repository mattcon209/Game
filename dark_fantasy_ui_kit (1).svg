        <text x="400" y="26" font-family="Cinzel, serif" font-size="14" fill="#ffffff" font-weight="bold" text-anchor="middle" letter-spacing="2">MALAKOR THE VOIDLORD — 850,000 / 1,000,000 HP</text>
        <circle cx="20" cy="22" r="16" fill="#800016" stroke="#ffd700" stroke-width="2"/>
        <path d="M 20 12 L 14 26 H 26 Z" fill="#ffd700"/>
    </g>

    <!-- SECTION 8: WINDOW FRAMES, DIALOGS & TOOLTIPS -->
    <text x="60" y="1120" class="cat-title">8. WINDOW FRAMES, QUEST LOGS &amp; ITEM TOOLTIPS</text>

    <g transform="translate(60, 1150)" class="ui-elem" id="win-quest-log">
