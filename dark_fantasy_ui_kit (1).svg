    <g transform="translate(60, 810)" class="ui-elem" id="icon-shield">
        <rect x="0" y="0" width="60" height="60" fill="rgba(12,10,18,0.8)" stroke="#332244" stroke-width="1"/>
        <path d="M 30 8 L 50 16 V 34 C 50 46 30 54 30 54 C 30 54 10 46 10 34 V 16 Z" fill="none" stroke="currentColor" stroke-width="2.5"/>
        <path d="M 30 16 L 42 21 V 32 C 42 40 30 46 30 46 C 30 46 18 40 18 32 V 21 Z" fill="currentColor"/>
    </g>
    <g transform="translate(130, 810)" class="ui-elem" id="icon-swords">
