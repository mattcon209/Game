        <circle cx="80" cy="80" r="66" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="80" y="22" font-family="Cinzel, serif" font-size="12" fill="#ff2a4b" font-weight="bold" text-anchor="middle">N</text>
        <text x="80" y="152" font-family="Cinzel, serif" font-size="12" fill="currentColor" font-weight="bold" text-anchor="middle">S</text>
        <text x="150" y="84" font-family="Cinzel, serif" font-size="12" fill="currentColor" font-weight="bold" text-anchor="middle">E</text>
        <text x="12" y="84" font-family="Cinzel, serif" font-size="12" fill="currentColor" font-weight="bold" text-anchor="middle">W</text>
