        <path d="M 80 8 A 72 72 0 0 0 8 80" fill="none" stroke="#ff2a4b" stroke-width="6" stroke-linecap="round"/>
        <path d="M 80 8 A 72 72 0 0 1 152 80" fill="none" stroke="#00d2ff" stroke-width="6" stroke-linecap="round"/>
        <circle cx="80" cy="80" r="60" fill="none" stroke="currentColor" stroke-width="1.5"/>
    </g>

