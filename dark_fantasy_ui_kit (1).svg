        <rect x="6" y="6" width="48" height="48" fill="none" stroke="#005588" stroke-width="1"/>
        <path d="M 2 10 L 10 2 M 50 2 L 58 10 M 58 50 L 50 58 M 10 58 L 2 50" stroke="#00d2ff" stroke-width="2"/>
