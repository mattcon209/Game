        <polygon points="2,30 8,24 8,36" fill="#ffd700"/>
        <polygon points="58,30 52,24 52,36" fill="#ffd700"/>
        <text x="30" y="68" class="elem-label">Legendary</text>
    </g>
    <g transform="translate(380, 260)" class="ui-elem" id="sq-5" filter="url(#glow-crimson)">
        <rect x="2" y="2" width="56" height="56" fill="rgba(25,5,10,0.9)" stroke="#ff2a4b" stroke-width="2.5"/>
        <circle cx="6" cy="6" r="3" fill="#ff2a4b"/>
        <circle cx="54" cy="6" r="3" fill="#ff2a4b"/>
        <circle cx="6" cy="54" r="3" fill="#ff2a4b"/>
        <circle cx="54" cy="54" r="3" fill="#ff2a4b"/>
