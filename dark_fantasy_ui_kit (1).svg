        <circle cx="70" cy="70" r="58" fill="none" stroke="currentColor" stroke-width="1"/>
        <polygon points="70,10 118,100 22,100" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <polygon points="70,130 118,40 22,40" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="70" cy="70" r="18" fill="none" stroke="currentColor" stroke-width="1.5"/>
    </g>

    <g transform="translate(220, 610)" class="ui-elem" id="sigil-sunburst">
        <circle cx="70" cy="70" r="66" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M 70 0 L 70 140 M 0 70 L 140 70 M 20 20 L 120 120 M 120 20 L 20 120" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="70" cy="70" r="30" fill="none" stroke="currentColor" stroke-width="2"/>
    </g>

    <g transform="translate(380, 610)" class="ui-elem" id="sigil-skull-seal">
        <circle cx="70" cy="70" r="66" fill="none" stroke="#ff2a4b" stroke-width="2"/>
        <polygon points="70,12 120,118 20,118" fill="none" stroke="#ff2a4b" stroke-width="1.5"/>
        <circle cx="70" cy="70" r="28" fill="rgba(30,0,10,0.8)" stroke="#ff2a4b" stroke-width="2"/>
        <path d="M 70 54 C 62 54 58 60 58 68 C 58 73 60 76 62 78 V 82 H 78 V 78 C 80 76 82 73 82 68 C 82 60 78 54 70 54 Z" fill="none" stroke="#ff2a4b" stroke-width="2"/>
        <circle cx="65" cy="66" r="2" fill="#ff2a4b"/>
        <circle cx="75" cy="66" r="2" fill="#ff2a4b"/>
    </g>

    <!-- SECTION 5: GAME ICONS -->
