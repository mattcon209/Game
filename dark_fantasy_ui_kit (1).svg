    <g transform="translate(200, 810)" class="ui-elem" id="icon-skull">
        <rect x="0" y="0" width="60" height="60" fill="rgba(12,10,18,0.8)" stroke="#332244" stroke-width="1"/>
        <path d="M 30 8 C 18 8 12 18 12 30 C 12 38 16 43 20 45 V 52 H 40 V 45 C 44 43 48 38 48 30 C 48 18 42 8 30 8 Z" fill="none" stroke="currentColor" stroke-width="2.5"/>
        <circle cx="21" cy="28" r="5" fill="currentColor"/>
        <circle cx="39" cy="28" r="5" fill="currentColor"/>
    </g>
    <g transform="translate(270, 810)" class="ui-elem" id="icon-bow">
        <rect x="0" y="0" width="60" height="60" fill="rgba(12,10,18,0.8)" stroke="#332244" stroke-width="1"/>
        <path d="M 12 10 C 35 10 48 25 48 30 C 48 35 35 50 12 50" fill="none" stroke="currentColor" stroke-width="3"/>
        <line x1="12" y1="10" x2="12" y2="50" stroke="currentColor" stroke-width="1.5"/>
        <line x1="8" y1="30" x2="52" y2="30" stroke="currentColor" stroke-width="2"/>
    </g>

    <!-- SECTION 6: DIVIDERS -->
    <text x="60" y="910" class="cat-title">6. GOTHIC DIVIDERS &amp; LINE ACCENTS</text>

    <g transform="translate(60, 930)" class="ui-elem" id="div-barbed-wing">
        <path d="M 0 20 L 400 20 M 500 20 L 900 20" stroke="currentColor" stroke-width="2.5"/>
        <polygon points="450,2 430,20 450,38 470,20" fill="currentColor"/>
        <polygon points="450,20 400,10 400,30" fill="currentColor"/>
        <polygon points="450,20 500,10 500,30" fill="currentColor"/>
    </g>

    <!-- SECTION 7: GAUGES & STATUS BARS -->
