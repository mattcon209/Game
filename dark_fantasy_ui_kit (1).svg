        <text x="180" y="45" font-family="Cinzel, serif" font-size="16" fill="#a855f7" font-weight="bold" text-anchor="middle">VOIDMIST ROBE</text>
        <text x="180" y="65" font-family="sans-serif" font-size="11" fill="#8888aa" text-anchor="middle">Epic Chest Armor</text>
        <line x1="30" y1="80" x2="330" y2="80" stroke="#a855f7" stroke-width="1"/>
        <text x="30" y="110" font-family="sans-serif" font-size="13" fill="#ffffff">+450 Armor Rating</text>
        <text x="30" y="135" font-family="sans-serif" font-size="13" fill="#00d2ff">+85 Spell Power</text>
        <text x="30" y="160" font-family="sans-serif" font-size="13" fill="#ffd700">+12% Critical Strike Chance</text>
