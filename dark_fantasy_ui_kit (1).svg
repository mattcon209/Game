<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 2200" width="2400" height="2200" style="background-color: #08060c; color: #ffffff;">
    <defs>
        <style>
            .header-title { font-family: 'Cinzel Decorative', 'Cinzel', serif; font-size: 36px; fill: #ffd700; font-weight: 900; letter-spacing: 3px; text-anchor: middle; }
            .header-sub { font-family: 'Cinzel', serif; font-size: 18px; fill: #a89bb8; letter-spacing: 2px; text-anchor: middle; }
            .cat-title { font-family: 'Cinzel', serif; font-size: 22px; fill: #ff2a4b; font-weight: bold; letter-spacing: 2px; }
            .elem-label { font-family: sans-serif; font-size: 10px; fill: #776e82; text-anchor: middle; }
            .ui-elem { color: #ffffff; transition: all 0.25s ease; cursor: pointer; }
            .ui-elem:hover { color: #ff2a4b; filter: drop-shadow(0 0 10px rgba(255,42,75,0.9)); }
        </style>

        <filter id="glow-crimson" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="glow-gold" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <!-- REUSABLE SYMBOLS -->
        <g id="sym-btn-1">
            <path d="M 15 2 L 185 2 L 198 15 L 198 29 L 185 42 L 15 42 L 2 29 L 2 15 Z" fill="rgba(15,10,22,0.85)" stroke="currentColor" stroke-width="2"/>
            <path d="M 18 6 L 182 6 L 194 18 L 194 26 L 182 38 L 18 38 L 6 26 L 6 18 Z" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="4,2"/>
            <path d="M 0 22 L 8 16 L 8 28 Z M 200 22 L 192 16 L 192 28 Z" fill="currentColor"/>
        </g>
        <g id="sym-btn-2">
            <path d="M 22 2 L 178 2 C 190 2 198 10 198 22 C 198 34 190 42 178 42 L 22 42 C 10 42 2 34 2 22 C 2 10 10 2 22 2 Z" fill="rgba(15,10,22,0.85)" stroke="currentColor" stroke-width="2"/>
            <circle cx="10" cy="22" r="3" fill="currentColor"/>
            <circle cx="190" cy="22" r="3" fill="currentColor"/>
        </g>
        <g id="sym-btn-3">
            <path d="M 20 2 C 5 2 2 15 2 22 C 2 29 5 42 20 42 L 180 42 C 195 42 198 29 198 22 C 198 15 195 2 180 2 Z" fill="rgba(15,10,22,0.85)" stroke="currentColor" stroke-width="2"/>
            <polygon points="100,2 96,6 104,6" fill="currentColor"/>
            <polygon points="100,42 96,38 104,38" fill="currentColor"/>
        </g>
        <g id="sym-btn-4">
            <rect x="2" y="2" width="196" height="40" fill="rgba(15,10,22,0.85)" stroke="currentColor" stroke-width="2"/>
            <rect x="6" y="6" width="188" height="32" fill="none" stroke="currentColor" stroke-width="1"/>
            <path d="M 2 10 L 10 2 M 198 10 L 190 2 M 2 34 L 10 42 M 198 34 L 190 42" stroke="currentColor" stroke-width="2"/>
        </g>
    </defs>

    <!-- Canvas Grid -->
    <rect width="2400" height="2200" fill="#07050a"/>
    <circle cx="1200" cy="1100" r="1000" fill="#1b0826" opacity="0.3"/>

    <!-- HEADER -->
    <text x="1200" y="60" class="header-title">DARK FANTASY MASTER EXPANDED UI SUITE</text>
    <text x="1200" y="90" class="header-sub">Complete Master Collection — Over 150 Game UI Vector Assets</text>
    <line x1="100" y1="110" x2="2300" y2="110" stroke="#442255" stroke-width="2"/>

    <!-- SECTION 1: BUTTONS & TABS -->
    <text x="60" y="150" class="cat-title">1. BUTTONS, TABS &amp; ACTION CONTROLS</text>

    <g transform="translate(60, 170)" class="ui-elem" id="btn-1">
        <use href="#sym-btn-1"/>
        <text x="100" y="26" font-family="Cinzel, serif" font-size="12" fill="currentColor" text-anchor="middle" font-weight="bold">ACCEPT QUEST</text>
    </g>
    <g transform="translate(280, 170)" class="ui-elem" id="btn-2">
        <use href="#sym-btn-2"/>
        <text x="100" y="26" font-family="Cinzel, serif" font-size="12" fill="currentColor" text-anchor="middle" font-weight="bold">INVENTORY</text>
    </g>
    <g transform="translate(500, 170)" class="ui-elem" id="btn-3">
        <use href="#sym-btn-3"/>
        <text x="100" y="26" font-family="Cinzel, serif" font-size="12" fill="currentColor" text-anchor="middle" font-weight="bold">SPELLBOOK</text>
    </g>
    <g transform="translate(720, 170)" class="ui-elem" id="btn-4">
        <use href="#sym-btn-4"/>
        <text x="100" y="26" font-family="Cinzel, serif" font-size="12" fill="currentColor" text-anchor="middle" font-weight="bold">EQUIP ALL</text>
    </g>
    <g transform="translate(940, 170)" class="ui-elem" id="btn-5">
        <path d="M 2 2 L 180 2 L 198 22 L 180 42 L 2 42 Z" fill="rgba(15,10,22,0.85)" stroke="currentColor" stroke-width="2"/>
        <text x="90" y="26" font-family="Cinzel, serif" font-size="12" fill="currentColor" text-anchor="middle" font-weight="bold">NEXT TAB ►</text>
    </g>
    <g transform="translate(1160, 170)" class="ui-elem" id="btn-6">
        <path d="M 20 2 L 198 2 L 198 42 L 20 42 L 2 22 Z" fill="rgba(15,10,22,0.85)" stroke="currentColor" stroke-width="2"/>
        <text x="110" y="26" font-family="Cinzel, serif" font-size="12" fill="currentColor" text-anchor="middle" font-weight="bold">◄ PREV TAB</text>
    </g>
    <g transform="translate(1380, 170)" class="ui-elem" id="btn-7">
        <path d="M 10 2 L 90 2 L 100 8 L 110 2 L 190 2 L 198 10 L 198 34 L 190 42 L 110 42 L 100 36 L 90 42 L 10 42 L 2 34 L 2 10 Z" fill="rgba(15,10,22,0.85)" stroke="currentColor" stroke-width="2"/>
        <text x="100" y="26" font-family="Cinzel, serif" font-size="12" fill="currentColor" text-anchor="middle" font-weight="bold">CAST SPELL</text>
    </g>
    <g transform="translate(1600, 170)" class="ui-elem" id="btn-8">
        <path d="M 25 2 C 10 2 2 12 2 22 C 2 32 10 42 25 42 L 175 42 C 190 42 198 32 198 22 C 198 12 190 2 175 2 Z" fill="rgba(15,10,22,0.85)" stroke="currentColor" stroke-width="2"/>
        <text x="100" y="26" font-family="Cinzel, serif" font-size="12" fill="currentColor" text-anchor="middle" font-weight="bold">PURCHASE</text>
    </g>
    <g transform="translate(1820, 170)" class="ui-elem" id="btn-9">
        <rect x="4" y="4" width="192" height="36" fill="rgba(15,10,22,0.85)" stroke="currentColor" stroke-width="2"/>
        <path d="M 0 22 L 8 18 L 4 22 L 8 26 Z M 200 22 L 192 18 L 196 22 L 192 26 Z" fill="currentColor"/>
        <text x="100" y="26" font-family="Cinzel, serif" font-size="12" fill="currentColor" text-anchor="middle" font-weight="bold">DECLINE</text>
    </g>

    <!-- SECTION 2: ITEM SLOTS & RARITY TIERS -->
    <text x="60" y="240" class="cat-title">2. ITEM SLOTS, INVENTORY TIERS &amp; RARITY FRAMES</text>

    <g transform="translate(60, 260)" class="ui-elem" id="sq-1">
        <rect x="2" y="2" width="56" height="56" fill="rgba(12,10,18,0.9)" stroke="#555566" stroke-width="2"/>
        <rect x="6" y="6" width="48" height="48" fill="none" stroke="#333344" stroke-width="1"/>
        <text x="30" y="68" class="elem-label">Common</text>
    </g>
    <g transform="translate(140, 260)" class="ui-elem" id="sq-2">
