        <rect x="20" y="20" width="520" height="360" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="6,3"/>
        <path d="M 230 10 L 280 0 L 330 10 L 310 30 L 250 30 Z" fill="rgba(128,0,22,0.8)" stroke="currentColor" stroke-width="2"/>
        <text x="280" y="55" font-family="Cinzel, serif" font-size="20" fill="#ffd700" font-weight="bold" text-anchor="middle" letter-spacing="2">QUEST LOG SHEET</text>
